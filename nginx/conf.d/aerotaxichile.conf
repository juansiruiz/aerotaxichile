# ─── AeroTaxi Chile — Nginx virtual host ────────────────────────────────────
# Reemplazar "aerotaxichile.cl" por el dominio real.

# ── HTTP → HTTPS redirect + ACME challenge ─────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name aerotaxichile.cl www.aerotaxichile.cl;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS — aplicación ──────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name aerotaxichile.cl www.aerotaxichile.cl;

    # ── SSL (Let's Encrypt) ────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/aerotaxichile.cl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aerotaxichile.cl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Security headers ───────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN"    always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── API (Hono) en /api/* ────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://api:4000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 60s;
    }

    # ── Uploads (fotos) servidos estáticos desde nginx ──────────────────────
    location /uploads/ {
        alias /var/www/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── Next.js static assets (cache agresivo) ─────────────────────────────
    location /_next/static/ {
        proxy_pass http://web:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Service Worker (sin cache) ─────────────────────────────────────────
    location = /sw.js {
        proxy_pass http://web:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ── Next.js (todo el resto) ────────────────────────────────────────────
    location / {
        proxy_pass         http://web:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
    }
}
